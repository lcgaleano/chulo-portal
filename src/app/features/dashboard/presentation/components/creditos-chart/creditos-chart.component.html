<mat-card class="chart-card">
  <mat-card-header>
    <mat-card-title>Distribución de Créditos por Estado</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <canvas baseChart
      [type]="'doughnut'"
      [data]="chartData"
      [options]="chartOptions">
    </canvas>
  </mat-card-content>
</mat-card>
